<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Homepage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: black;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .hero {
            background-color: lightgrey;
            padding: 60px 20px;
            text-align: center;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border: 2px solid black;
        }
        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Personal Homepage</h1>
    </header>
    <section class="hero">
        <h2>My Name/Title</h2>
    </section>
    <section class="gallery">
        <h2>Cars Gallery</h2>
        <img src="https://via.placeholder.com/300x200?text=Car+1" alt="Car 1">
        <img src="https://via.placeholder.com/300x200?text=Car+2" alt="Car 2">
        <img src="https://via.placeholder.com/300x200?text=Car+3" alt="Car 3">
        <img src="https://via.placeholder.com/300x200?text=Car+4" alt="Car 4">
        <img src="https://via.placeholder.com/300x200?text=Car+5" alt="Car 5">
        <img src="https://via.placeholder.com/300x200?text=Car+6" alt="Car 6">
    </section>
    <footer>
        <p>&copy; 2026 My Name. All rights reserved.</p>
    </footer>
</body>
</html>
