<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Chapter | 极客日记本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .gradient-text { background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="max-w-2xl w-full glass-card rounded-xl p-6 shadow-2xl">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold gradient-text cursor-pointer" onclick="location.reload()">Z-Chapter.Log</h1>
            <div id="auth-status" class="text-[10px] px-2 py-1 rounded bg-slate-800">
                Checking Auth...
            </div>
        </header>

        <div id="view-setup" class="hidden py-10 text-center">
            <p class="text-sm text-slate-400 mb-4">请输入 GitHub Token 激活云端存储</p>
            <input id="token-input" type="password" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-xs mb-4 outline-none focus:border-indigo-500" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="saveToken()" class="w-full py-3 bg-indigo-600 rounded-lg font-bold text-sm">激活系统</button>
        </div>

        <div id="view-main" class="hidden">
            <div class="flex justify-between mb-6">
                <h2 class="text-slate-400 text-sm">Recent Chapters</h2>
                <button onclick="showForm()" class="text-xs bg-emerald-600 px-3 py-1 rounded hover:bg-emerald-500 transition-all">+ New</button>
            </div>
            <div id="list-container" class="space-y-3"></div>
        </div>

        </div>

    <script>
        const CONFIG = {
            owner: 'Z-Chapter',
            repo: 'chapter-one',
            token: localStorage.getItem('gh_token')
        };

        window.onload = () => {
            if (!CONFIG.token) {
                document.getElementById('view-setup').classList.remove('hidden');
                document.getElementById('auth-status').innerHTML = "❌ Unauthorized";
            } else {
                document.getElementById('view-main').classList.remove('hidden');
                document.getElementById('auth-status').innerHTML = "✅ Synced";
                fetchData();
            }
        };

        function saveToken() {
            const val = document.getElementById('token-input').value.trim();
            if (val) {
                localStorage.setItem('gh_token', val);
                location.reload();
            }
        }

        async function fetchData() {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues`, {
                headers: { 'Authorization': `token ${CONFIG.token}` }
            });
            const data = await res.json();
            renderList(data);
        }

        function renderList(issues) {
            document.getElementById('list-container').innerHTML = issues.map(i => `
                <div class="p-3 bg-slate-800/50 border border-slate-700 rounded text-sm mb-2">
                    <div class="font-bold text-sky-400">${i.title}</div>
                    <div class="text-[10px] text-slate-500 mt-1">${new Date(i.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
