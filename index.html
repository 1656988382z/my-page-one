<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Chapter | 极客日记本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .gradient-text { background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .btn-primary { background: #6366f1; transition: all 0.3s; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="max-w-2xl w-full glass-card rounded-xl p-6 shadow-2xl">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold gradient-text cursor-pointer" onclick="goToList()">Z-Chapter.Log</h1>
                <p class="text-xs text-slate-500 mt-1">Status: <span id="sync-status" class="text-emerald-500 font-bold">● Cloud Syncing</span></p>
            </div>
            <button onclick="showCreate()" class="text-sm px-4 py-2 btn-primary rounded-lg font-bold">New Entry</button>
        </header>

        <div id="view-list" class="space-y-4">
            <div id="list-container" class="space-y-3">
                <p class="text-center text-slate-500 py-10 italic">Initializing GitHub API...</p>
            </div>
        </div>

        <div id="view-detail" class="hidden animate-fade-in">
            <button onclick="goToList()" class="text-sm text-sky-400 mb-4 flex items-center">← Back to List</button>
            <h2 id="detail-title" class="text-2xl font-bold text-slate-100 mb-4"></h2>
            <div id="detail-body" class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap border-l-2 border-slate-700 pl-4 mb-8"></div>
            <div class="flex space-x-4 border-t border-slate-800 pt-6">
                <button id="edit-btn" class="text-sm text-indigo-400 hover:underline">Edit Entry</button>
                <button id="delete-btn" class="text-sm text-rose-500 hover:underline">Delete Forever</button>
            </div>
        </div>

        <div id="view-form" class="hidden space-y-4">
            <h3 id="form-header" class="text-xl font-bold text-slate-200">New Chapter</h3>
            <input id="form-title" type="text" placeholder="Title" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none">
            <textarea id="form-body" rows="8" placeholder="Content (Markdown supported)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none"></textarea>
            <div class="flex space-x-3">
                <button onclick="saveDiary()" class="flex-1 py-3 btn-primary rounded-lg font-bold text-sm">Save to Cloud</button>
                <button onclick="goToList()" class="px-6 py-3 bg-slate-800 rounded-lg font-bold text-sm text-slate-400">Cancel</button>
            </div>
        </div>
    </div>
